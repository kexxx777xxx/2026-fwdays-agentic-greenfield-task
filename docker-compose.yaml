services:
  app:
    build: .
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - .:/app
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.18.0
    # No named volume on purpose: qdrant state is ephemeral, so
    # ingest idempotency tests always run against a clean store.
