# CodeRabbit — рев'ю домашнього завдання курсу «Agentic Engineering: Greenfield».
# Стек у студентів будь-який, тому рев'ю фокусується на ДОКАЗАХ застосування
# агентних інженерних практик, а не на конкретній технології.
# Перевірки дорадчі (не блокують мердж) — це навчальний фідбек, не гейт.
language: "uk-UA"
tone_instructions: >-
  Ти — ментор курсу Agentic Engineering (greenfield). Пиши українською, дружньо,
  але вимогливо. Оцінюй ПРОЦЕС (як застосовано агентні інженерні практики), а не
  лише код. Стек може бути будь-який — ніколи не вимагай конкретної технології,
  фреймворку чи структури папок.

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
  # Заморожені OpenSpec-зміни в архіві — це історичні записи процесу, а не код
  # під рев'ю: їхній формат стартує з `##` (конфлікт із MD041/MD022) і вони
  # незмінні за визначенням. Живі специфікації (openspec/specs/**) лишаються
  # під рев'ю; їх перевіряє ще й `openspec validate`.
  path_filters:
    - "!openspec/changes/archive/**"
  path_instructions:
    - path: "**"
      instructions: >-
        Це здача домашнього завдання курсу «Agentic Engineering: Greenfield».
        Студент міг використати будь-який стек. Прочитай опис Pull Request разом зі
        змінами й оціни ДОКАЗИ:
        (1) вказане справжнє імʼя автора;
        (2) є посилання на відео-демо (1–2 хв);
        (3) є ЗМІСТОВНИЙ опис застосованих практик Agentic Engineering — контекст-
        інженерія / AGENTS.md, цикли (loops), maker≠checker / суб-агенти,
        специфікації-тести-evals, верифікація, які інструменти й MCP використано,
        що вирішував студент, а що агент;
        (4) результат доведено до кінця, а не «згенеровано і кинуто».
        Якщо чогось із (1)–(4) бракує — ввічливо й конкретно скажи, чого саме.
        Код рев'юй по суті (очевидні баги, безпека секретів, ясність), без причіпок
        до стилю, який і так ловить лінтер. Хвали те, що зроблено інженерно.
